name: iOS CI - Build and Upload to App Store Connect

on:
  push:
    branches: [ "release" ]
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: macos-26

    env:
      BUNDLE_IDENTIFIER: ${{ secrets.BUNDLE_IDENTIFIER }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26.0'

    - name: Download iOS platform
      run: xcodebuild -downloadPlatform iOS

    - name: Import Signing Assets
      uses: apple-actions/import-codesign-certs@v2
      with:
        p12-file-base64: ${{ secrets.APPSTORE_CONNECT_CERTIFICATE }}
        p12-password: ${{ secrets.APPSTORE_CONNECT_CERTIFICATE_PASSWORD }}
        p12-import-location: "file"
        create-keychain: true
        keychain-password: "temp_password"

    - name: Install Provisioning Profile
      run: |
        echo "${{ secrets.APPSTORE_CONNECT_PROVISIONING_PROFILE }}" | base64 --decode > profile.mobileprovision
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
        UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i profile.mobileprovision)")
        cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
        echo "✅ Installed provisioning profile with UUID: $UUID"

    - name: Resolve Swift Package Dependencies
      run: |
        xcodebuild -resolvePackageDependencies \
          -project ${{ secrets.TARGET_PROJECT }}.xcodeproj \
          -scheme "${{ secrets.TARGET_PROJECT }}"

    - name: Build and Archive iOS App
      run: |
        mkdir -p ./output
        PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' /dev/stdin <<< "$(security cms -D -i profile.mobileprovision)")
        PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i profile.mobileprovision)")
        echo "✅ Using profile: $PROFILE_NAME (UUID: $PROFILE_UUID)"

        BUNDLE_ID="$BUNDLE_IDENTIFIER"
        if [ -z "$BUNDLE_ID" ]; then
          echo "❌ Error: BUNDLE_IDENTIFIER secret is not set"
          exit 1
        fi

        KEYCHAIN_PATH=$(security list-keychains | tr -d '"' | head -1 | xargs)
        security unlock-keychain -p "temp_password" "$KEYCHAIN_PATH" 2>/dev/null || true
        CODE_SIGN_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" 2>/dev/null | grep -E "(Apple Distribution|iPhone Distribution)" | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
        if [ -z "$CODE_SIGN_IDENTITY" ]; then
          CODE_SIGN_IDENTITY="Apple Distribution"
        fi

        python3 ".github/scripts/exclude_spm_from_signing.py" "${{ secrets.TARGET_PROJECT }}.xcodeproj/project.pbxproj" "$PROFILE_UUID" "${{ secrets.TARGET_PROJECT }}"

        xcodebuild \
          -project ${{ secrets.TARGET_PROJECT }}.xcodeproj \
          -scheme "${{ secrets.TARGET_PROJECT }}" \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath ./output/${{ secrets.TARGET_PROJECT }}.xcarchive \
          -skipPackageUpdates \
          DEVELOPMENT_TEAM=${{ secrets.TEAM_ID }} \
          PRODUCT_BUNDLE_IDENTIFIER=$BUNDLE_ID \
          CODE_SIGN_STYLE=Manual \
          CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY" \
          COMPILER_INDEX_STORE_ENABLE=NO \
          SWIFT_COMPILATION_MODE=wholemodule \
          ONLY_ACTIVE_ARCH=NO \
          archive 2>&1 | tee xcodebuild.log

    - name: Upload Build Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: xcodebuild-logs
        path: xcodebuild.log

    - name: Create Export Options
      run: |
        PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' /dev/stdin <<< "$(security cms -D -i profile.mobileprovision)")
        BUNDLE_ID="$BUNDLE_IDENTIFIER"
        cat > ExportOptions.plist <<EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
                <key>$BUNDLE_ID</key>
                <string>$PROFILE_NAME</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <false/>
        </dict>
        </plist>
        EOF

    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
                   -archivePath ./output/${{ secrets.TARGET_PROJECT }}.xcarchive \
                   -exportOptionsPlist ./ExportOptions.plist \
                   -exportPath ./output

        IPA_FILE=$(ls ./output/*.ipa | head -1)
        mv "$IPA_FILE" ./output/${{ secrets.TARGET_PROJECT }}.ipa

    - name: Upload to App Store Connect
      env:
        API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
        API_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_API_ISSUER_ID }}
        API_PRIVATE_KEY: ${{ secrets.APPSTORE_CONNECT_API_PRIVATE_KEY }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo "$API_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8
        chmod 600 ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8

        xcrun altool --upload-app \
          --type ios \
          --file "./output/${{ secrets.TARGET_PROJECT }}.ipa" \
          --apiKey "$API_KEY_ID" \
          --apiIssuer "$API_ISSUER_ID" \
          --verbose
